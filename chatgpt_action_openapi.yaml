openapi: 3.1.0
info:
  title: A Share Market Data Service
  version: 0.2.0
  description: V5单股深度研究数据服务：获取A股实时大盘、个股报价、盘口、板块、技术点位、三日走势、分时结构、基本面/估值占位、赔率、分周期盈利概率、账户约束和轻量复盘记忆；不再默认选股。
servers:
  - url: https://a-share-market-data-service.onrender.com
    description: Render deployment
paths:
  /health:
    get:
      operationId: health
      x-openai-isConsequential: false
      summary: 检查行情服务状态
      responses:
        "200":
          description: 服务状态
  /market/snapshot:
    get:
      operationId: getMarketSnapshot
      x-openai-isConsequential: false
      summary: 获取实时大盘快照
      responses:
        "200":
          description: 大盘指数、涨跌家数、涨跌停数和市场温度
  /stock/quotes:
    get:
      operationId: getStockQuotes
      x-openai-isConsequential: false
      summary: 获取多只股票实时行情
      parameters:
        - name: codes
          in: query
          required: true
          schema:
            type: string
          description: 逗号分隔的股票代码，例如 000725,600667,600879
      responses:
        "200":
          description: 个股实时行情
  /stock/bidask:
    get:
      operationId: getStockBidAsk
      x-openai-isConsequential: false
      summary: 获取个股五档盘口和可执行性
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: cash
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: 五档盘口、涨停封板识别和可买状态
  /boards/hot:
    get:
      operationId: getHotBoards
      x-openai-isConsequential: false
      summary: 获取热门板块
      responses:
        "200":
          description: 热门行业、概念或异动板块
  /stock/technical:
    get:
      operationId: getStockTechnical
      x-openai-isConsequential: false
      summary: 获取个股技术分析点位
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MA、RSI、MACD、买入点、卖出点、止损点和来源
  /stock/intraday-analysis:
    post:
      operationId: getStockIntradayAnalysis
      x-openai-isConsequential: false
      summary: V5单股深度研究：盈利概率、赔率和风险分析
      description: 默认单股研究入口。聚合实时基础行情、1分钟分时、五档盘口、最近成交、日K技术指标、最近三日走势、当日分时总结、K线结构、均线结构、量价关系、相对强弱、支撑压力区、风险波动、盘口解释、板块-个股匹配、市场状态、涨停池关联、账户约束和复盘记录；返回V5单股深度研究字段，包括time_horizon_probability、risk_reward_profile、fundamental_research、valuation_research、event_risk_research、sector_position_research、technical_research、operation_plan_v50、invalidation_conditions和final_research_score，用于回答这只股票当前价格下短线/波段盈利概率、赔率和风险。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: 6位股票代码，例如 002100
                intraday_limit:
                  type: integer
                  description: 可选，只返回最近N条1分钟分时
                trade_limit:
                  type: integer
                  description: 可选，只返回最近N笔成交明细
                include_market_breadth:
                  type: boolean
                  description: 是否在单票深挖时同时抓全市场涨跌家数；默认false以避免免费云服务超时，需要完整市场广度时优先单独调用getMarketSnapshot
                include_recent_trades:
                  type: boolean
                  description: 是否抓最近成交明细；竞价或盘中快速分析可设为false以减少等待
                  default: true
                include_zt_pool:
                  type: boolean
                  description: 是否抓涨停池关联；竞价或盘中快速分析可设为false以减少等待
                  default: true
                account:
                  type: object
                  description: 用户账户约束，可由截图或手工输入转换而来
                  properties:
                    cash:
                      type: number
                    total_asset:
                      type: number
                    positions:
                      type: array
                      items:
                        type: object
                        properties:
                          code:
                            type: string
                          name:
                            type: string
                          shares:
                            type: integer
                          available:
                            type: integer
                          cost:
                            type: number
              required:
                - code
      responses:
        "200":
          description: V5单股深度研究完整数据结构。GPT必须优先使用v50_research_summary、time_horizon_probability、risk_reward_profile、fundamental_research、valuation_research、event_risk_research、sector_position_research、technical_research、operation_plan_v50、invalidation_conditions和final_research_score，同时结合trade_setup_type、professional_technical_diagnosis、recent_3d_context、today_intraday_summary、support_resistance_zones、order_book_interpretation、position_risk_contribution和review_record。
  /candidates/actionable:
    get:
      operationId: getActionableCandidates
      x-openai-isConsequential: false
      summary: 明确要求选股时获取可执行候选股
      description: 候选工具只在用户明确要求选股时使用；V5默认工作流是不再默认选股，而是先分析用户指定的单只股票。返回的buy_now/candidates只表示可执行，不等于推荐。
      parameters:
        - name: cash
          in: query
          required: true
          schema:
            type: number
        - name: price_limit
          in: query
          required: false
          schema:
            type: number
            default: 20
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: recent_codes
          in: query
          required: false
          schema:
            type: string
          description: 近期已推荐或重点观察过的股票代码，逗号分隔；这些股票默认降级到观察池，避免重复推荐
      responses:
        "200":
          description: 返回候选机会漏斗。候选工具只在用户明确要求选股时使用；buy_now/candidates只表示盘口和现金可执行，不等于推荐；recommendation_tier才决定强推荐可买/小仓试错/条件观察/剔除。
  /candidates/verify:
    post:
      operationId: verifyCandidates
      x-openai-isConsequential: false
      summary: 核验由ChatGPT或用户提供的候选股票
      description: 候选工具只在用户明确要求选股时使用。对候选股票逐只核验实时价格、盘口可执行性、技术点位、现金约束、主板范围、追高风险和候选生命周期，用于明确选股场景；普通单股问题应优先使用getStockIntradayAnalysis。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cash:
                  type: number
                  description: 当前可用现金，用于判断是否买得起一手
                previous_recommendations:
                  type: array
                  description: 最近已经推荐或重点观察过的股票，用于去重；重复股票没有新实时证据时应进入观察池而不是再次作为新推荐
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                      name:
                        type: string
                candidates:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: 股票代码，例如 000725
                      name:
                        type: string
                        description: 股票名称
                      source_reason:
                        type: string
                        description: ChatGPT或用户提出该候选的原因，例如板块异动、新闻催化、涨幅榜等
              required:
                - cash
                - candidates
      responses:
        "200":
          description: 每只候选的实时核验结果、买卖止损点、候选生命周期candidate_lifecycle和最终推荐评级
  /portfolio/analyze:
    post:
      operationId: analyzePortfolio
      x-openai-isConsequential: false
      summary: 基于实时行情分析持仓
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cash:
                  type: number
                positions:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                      name:
                        type: string
                      shares:
                        type: integer
                      available:
                        type: integer
                      cost:
                        type: number
      responses:
        "200":
          description: 持仓诊断、T+1约束和操作建议
  /portfolio/intraday-decision:
    post:
      operationId: getPortfolioIntradayDecision
      x-openai-isConsequential: false
      summary: 组合快速分析：快速聚合盘中持仓决策数据
      description: 当用户只说分析持仓、看看现在仓位、竞价分析、盘中看一下、总体分析一下时，默认先使用本操作做组合快速分析，拿到市场、板块、全部持仓和明显风险点。需要盘中全面分析时，应在快速总览后升级深度分析，不能因为盘中就只给简略判断。fast模式跳过最近成交和涨停池以减少等待，适合第一步总览；deep模式用于盘中全面分析、重要持仓深挖、盘后复盘或需要最近成交时。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                    - fast
                    - deep
                  default: fast
                  description: fast更快，默认跳过最近成交和涨停池；deep更完整但更慢
                cash:
                  type: number
                  description: 当前可用现金
                intraday_limit:
                  type: integer
                  description: fast模式默认返回最近60条1分钟分时摘要所需数据
                max_workers:
                  type: integer
                  description: 后端并行抓取持仓数量，默认最多4
                positions:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                      name:
                        type: string
                      shares:
                        type: integer
                      available:
                        type: integer
                      cost:
                        type: number
              required:
                - cash
                - positions
      responses:
        "200":
          description: 市场、板块、持仓摘要和每只持仓的核心盘中分析字段，用于替代多次串行调用。
  /reviews/log:
    post:
      operationId: logReview
      summary: 保存一次股票分析判断到复盘账本
      description: 分析完成后调用，保存股票代码、判断、关键点位、风险标签和数据来源，用于下次分析前对比。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                name:
                  type: string
                decision:
                  type: string
                  description: 本次判断，例如反抽不过21.34减仓
                decision_score:
                  type: number
                freshness:
                  type: string
                key_levels:
                  type: object
                  description: failure_line、buy_trigger、turnaround等关键点位
                risk_tags:
                  type: array
                  items:
                    type: string
                source:
                  type: string
              required:
                - code
                - decision
      responses:
        "200":
          description: 已保存的复盘记录和下次分析提示
  /reviews/recent:
    get:
      operationId: getRecentReviews
      summary: 读取最近复盘记录
      description: 分析某只股票或组合前调用，用于对比上次判断是否仍成立。
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: 可选，6位股票代码；不传则读取最近全部记录
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 最近复盘记录、对比提示和是否必须对比当前分析
  /reviews/evaluate:
    post:
      operationId: evaluateReview
      summary: 评估一条历史判断
      description: 盘后或次日复盘时调用，记录实际走势、实际动作、是否触发买入或失败线，并沉淀lesson标签。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                review_id:
                  type: string
                actual_outcome:
                  type: string
                actual_action:
                  type: string
                triggered_failure_line:
                  type: boolean
                triggered_buy_condition:
                  type: boolean
                lesson_tags:
                  type: array
                  items:
                    type: string
                outcome_rating:
                  type: string
                  description: 有效、无效、部分有效、待观察
                outcome_note:
                  type: string
              required:
                - review_id
      responses:
        "200":
          description: 已评估的复盘记录和下一步经验使用提示
  /reviews/lessons:
    get:
      operationId: getReviewLessons
      summary: 获取复盘经验总结
      description: 分析前调用，读取历史lesson标签和最近经验，提醒GPT避免重复错误或沿用有效经验。
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: lesson统计、最近经验和使用规则
